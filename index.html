<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul Simulator</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
        <!-- 1. Vollbildmodus (Macht die Webseite   zur App ohne Safari-Suchleiste) -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- 2. Name auf dem Home-Bildschirm (Überschreibt den Standardnamen) -->
    <meta name="apple-mobile-web-app-title" content="Schul Simulant">

    <!-- 3. Design der Statusleiste oben (iOS-Uhrzeit und Akku-Anzeige) -->
    <!-- Optionen: "default" (weiß), "black" (schwarz) oder "black-transluce(transparent/schwebend) --> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <style>
            .menu-activator {
                width: 40px;
                height: 24px; /* Auf 24px verkleinert, damit das X perfekt zentriert ist */
                border: none;
                background: none;
                cursor: pointer;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: 0px;
            }
            .menu-activator span {
                display: block;
                width: 100%;
                height: 4px;
                border-radius: 2px;
                background-color: #000;
                transition: transform 0.3s ease, opacity 0.3s ease;
                transform-origin: center;
            }
            
            /* REPARIERT: Werte korrigiert, damit das X genau in der Mitte entsteht */
            .menu-activator.offen span:nth-child(1) {
                transform: translateY(10px) rotate(45deg);
            } 
            .menu-activator.offen span:nth-child(2) {
                opacity: 0;
            }
            .menu-activator.offen span:nth-child(3) {
                transform: translateY(-10px) rotate(-45deg);
            }
            
            #navigator li {
                opacity: 1;
                transform: translateX(0);
                /* REPARIERT: Komma zwischen ease und opacity eingefügt */
                transition: transform 0.4s ease, opacity 0.4s ease;
                list-style:none;
                border-color:#e0e0e0;
                border:2px solid #333;
                background-color:#c8c8c8;
                width:70px;
                height:20px;
                margin:3px;
                text-align:center;
                border-radius:4px;
                
            }
            #navigator ul {
                padding-left:0px;
                padding-top:10px;
            }
            
            #navigator.closed li {
                opacity: 0;
                /* REPARIERT: px hinzugefügt */
                transform: translateX(-60px);
            }
            
            #navigator li:nth-child(1) { transition-delay: 0s; }
            #navigator li:nth-child(2) { transition-delay: 0.1s; } /* Zeiten etwas verkürzt für besseres Spiele-Gefühl */
            #navigator li:nth-child(3) { transition-delay: 0.2s; }
            /* REPARIERT: nith zu nth korrigiert */
            #navigator li:nth-child(4) { transition-delay: 0.3s; }
            #navigator li:nth-child(5) { transition-delay: 0.4s; }
        </style>
    </head>
    <body>
        <button id="burger-btn" class="menu-activator">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="navigator" class="closed">
            <ul>
                <li><a href="#">Test</a></li>
                <li><a href="#">Test</a></li>
                <li><a href="#">Test</a></li>
                <li><a href="#">Test</a></li>
                <li><a href="#">Test</a></li>
            </ul>
        </nav>
        <script>
            /* REPARIERT: Klammer am Ende hinzugefügt ); */
            const navBtn = document.getElementById('burger-btn');
            const navi = document.getElementById('navigator');
            
            navBtn.addEventListener('click', () => {
                /* REPARIERT: classlist zu classList geändert */
                navBtn.classList.toggle('offen');
                navi.classList.toggle('closed');
            });
        </script>
    </body>
</html>
